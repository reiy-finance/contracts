[package]
name = "reiy"
edition = "2024.beta"
version = "0.1.0"
license = "MIT"

[dependencies]
# DeepBook v3 — pinned to the documented testnet-v15 deployment.
# Do not use rev = "main"; package linkage must match the registry/pools used on-chain.
deepbook = { git = "https://github.com/MystenLabs/deepbookv3.git", subdir = "packages/deepbook", rev = "0df26919ab7582e32b212ce555261b4fddfc878c" }

[addresses]
reiy = "0x0"

# Per-environment configuration. DeepBook is published at different package IDs on each network,
# so build/publish under the matching environment:
#   sui move build --build-env mainnet
#   sui move build --build-env testnet
# The resolved published-at addresses for each environment are tracked per-env in Move.lock.
[environments]
mainnet = "35834a8a"
testnet = "4c78adac"

[dev-dependencies]

[dev-addresses]
